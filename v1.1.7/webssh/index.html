<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WebSSH Terminal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="/webssh/static/css/style.css?v=44">
    <!-- Apply persisted settings BEFORE first paint to prevent FOUC -->
    <script>
    (function(){
        try {
            var s = JSON.parse(localStorage.getItem('webssh_settings') || '{}');
            var root = document.documentElement;
            // Theme
            var theme = localStorage.getItem('webssh_theme') || 'dark';
            root.setAttribute('data-theme', theme);
            // Zoom (applied to body – set via CSS variable on html so body inherits)
            if (s.zoom && s.zoom !== 100) {
                root.style.setProperty('--init-zoom', s.zoom / 100);
                document.write('<style>body{zoom:' + (s.zoom / 100) + '}</style>');
            }
            // Background color
            if (s.bgColor) root.style.setProperty('--bg', s.bgColor);
            // Blur
            if (s.blur != null) root.style.setProperty('--blur', s.blur + 'px');
        } catch(e){}
    })();
    </script>
</head>
<body>
    <!-- Custom background image -->
    <div class="custom-bg" id="customBg"></div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-hd">
            <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>设置</span>
            <button class="settings-close" onclick="toggleSettings()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="settings-body">
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>系统检测频率</div>
                <div class="set-row">
                    <label>检测间隔</label>
                    <div class="set-zoom-btns">
                        <button class="set-zoom-btn" onclick="changeSysInterval(-5)">−</button>
                        <span class="set-zoom-label" id="sysIntervalLabel">60s</span>
                        <button class="set-zoom-btn" onclick="changeSysInterval(5)">+</button>
                    </div>
                </div>
                <div class="set-row">
                    <label>步进 ±5 秒，范围 5-600 秒</label>
                    <button class="set-save-btn" id="sysIntervalSaveBtn" onclick="saveSysInterval()">保存</button>
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>页面缩放</div>
                <div class="set-row">
                    <label>全局缩放</label>
                    <div class="set-zoom-btns">
                        <button class="set-zoom-btn" onclick="changeZoom(-1)">−</button>
                        <span class="set-zoom-label" id="zoomLabel">100%</span>
                        <button class="set-zoom-btn" onclick="changeZoom(1)">+</button>
                    </div>
                </div>
                <div class="set-row">
                    <label>SSH 登录框</label>
                    <div class="set-zoom-btns">
                        <button class="set-zoom-btn" onclick="changeCardScale(-1)">−</button>
                        <span class="set-zoom-label" id="cardScaleLabel">100%</span>
                        <button class="set-zoom-btn" onclick="changeCardScale(1)">+</button>
                    </div>
                </div>
                <div class="set-row">
                    <label>侧边按钮</label>
                    <div class="set-zoom-btns">
                        <button class="set-zoom-btn" onclick="changeEdgeScale(-1)">−</button>
                        <span class="set-zoom-label" id="edgeScaleLabel">100%</span>
                        <button class="set-zoom-btn" onclick="changeEdgeScale(1)">+</button>
                    </div>
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>背景图片</div>
                <div class="set-row">
                    <input type="url" id="bgImageUrl" placeholder="输入图片链接..." value="">
                    <button class="set-save-btn" id="bgImageSaveBtn" onclick="applyBgImage()">保存</button>
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>背景颜色</div>
                <div class="set-color-row" id="bgColorSwatches"></div>
                <div class="set-row">
                    <input type="color" id="bgColorPicker" value="#0a0a1a" style="width:36px;height:28px;border:1px solid var(--brd);border-radius:4px;background:transparent;cursor:pointer">
                    <label style="flex:0">自定义颜色</label>
                    <button class="set-save-btn" id="bgColorSaveBtn" onclick="applyBgColorCustom()">保存</button>
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>粒子效果</div>
                <div class="set-row">
                    <label>显示粒子动画</label>
                    <label class="checkbox-field" for="toggleParticles" style="flex:0;padding:0">
                        <input type="checkbox" id="toggleParticles" checked onchange="toggleParticlesEffect()">
                        <span class="checkbox-custom"></span>
                    </label>
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>毛玻璃强度</div>
                <div class="set-row">
                    <label id="blurLabel">20px</label>
                    <input type="range" id="blurRange" min="0" max="40" value="20" oninput="changeBlur(this.value)" style="flex:2;accent-color:var(--c1)">
                </div>
            </div>
            <div class="set-group">
                <div class="set-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h16M4 4h16"/></svg>页脚显示</div>
                <div class="set-row">
                    <label>显示底部版权信息</label>
                    <label class="checkbox-field" for="toggleFooter" style="flex:0;padding:0">
                        <input type="checkbox" id="toggleFooter" checked onchange="toggleFooterVisibility()">
                        <span class="checkbox-custom"></span>
                    </label>
                </div>
            </div>
            <button class="set-btn danger" onclick="resetAllSettings()">恢复默认设置</button>
        </div>
    </div>

    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="gradient-orb orb-4"></div>
    </div>
    <canvas id="particles"></canvas>

    <!-- ==================== LOGIN VIEW ==================== -->
    <div id="loginView" class="view active">
        <div class="login-layout">
            <div class="login-container">
                <div class="glass-card login-card animate-in">
                    <div class="card-header">
                        <div class="logo-container">
                            <div class="logo-ring">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="logo-icon"><path d="M4 17l6-6-6-6M12 19h8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </div>
                        </div>
                        <h1 class="title">WebSSH</h1>
                        <p class="subtitle">安全的远程终端连接</p>
                    </div>
                    <form id="loginForm" class="form-body" autocomplete="off">
                        <div class="input-group">
                            <div class="input-row">
                                <div class="input-field flex-3">
                                    <label>主机地址</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                                        <input type="text" id="hostname" placeholder="192.168.1.100" required>
                                    </div>
                                </div>
                                <div class="input-field flex-1">
                                    <label>端口</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4"/></svg>
                                        <input type="number" id="port" value="22" min="1" max="65535" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="input-field">
                            <label>用户名</label>
                            <div class="input-wrapper">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" id="username" placeholder="root" value="root" required>
                            </div>
                        </div>
                        <div class="auth-tabs">
                            <button type="button" class="auth-tab active" data-tab="password" onclick="switchAuthTab('password')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>密码
                            </button>
                            <button type="button" class="auth-tab" data-tab="key" onclick="switchAuthTab('key')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>密钥
                            </button>
                        </div>
                        <div id="passwordAuth" class="auth-panel active">
                            <div class="input-field">
                                <label>密码</label>
                                <div class="input-wrapper">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                    <input type="password" id="password" placeholder="输入密码">
                                    <button type="button" class="toggle-pwd" onclick="togglePassword()">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div id="keyAuth" class="auth-panel">
                            <div class="input-field">
                                <label>私钥内容</label>
                                <textarea id="privateKey" placeholder="粘贴私钥..." rows="3"></textarea>
                            </div>
                            <div class="input-field">
                                <label>私钥密码 (可选)</label>
                                <div class="input-wrapper">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                    <input type="password" id="passphrase" placeholder="可选">
                                </div>
                            </div>
                        </div>
                        <label class="checkbox-field" for="enableSysInfo">
                            <input type="checkbox" id="enableSysInfo" checked>
                            <span class="checkbox-custom"></span>
                            <span>连接后检测系统信息（每分钟检测一次）</span>
                        </label>
                        <label class="checkbox-field" for="enableProxy">
                            <input type="checkbox" id="enableProxy" onchange="toggleProxyPanel()">
                            <span class="checkbox-custom"></span>
                            <span>使用 SOCKS5 代理</span>
                        </label>
                        <div id="proxyPanel" class="proxy-panel">
                            <div class="input-row">
                                <div class="input-field flex-3">
                                    <label>代理地址</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                                        <input type="text" id="proxyHost" placeholder="127.0.0.1">
                                    </div>
                                </div>
                                <div class="input-field flex-1">
                                    <label>端口</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><circle cx="12" cy="12" r="3"/></svg>
                                        <input type="number" id="proxyPort" value="1080" placeholder="1080">
                                    </div>
                                </div>
                            </div>
                            <div class="input-row">
                                <div class="input-field flex-1">
                                    <label>用户名 (可选)</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                        <input type="text" id="proxyUser" placeholder="可选">
                                    </div>
                                </div>
                                <div class="input-field flex-1">
                                    <label>密码 (可选)</label>
                                    <div class="input-wrapper">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                        <input type="password" id="proxyPass" placeholder="可选">
                                    </div>
                                </div>
                            </div>
                            <label class="checkbox-field" for="rememberProxy">
                                <input type="checkbox" id="rememberProxy" onchange="saveProxyConfig()">
                                <span class="checkbox-custom"></span>
                                <span>记住代理配置</span>
                            </label>
                        </div>
                        <button type="submit" class="btn-connect" id="connectBtn">
                            <span class="btn-text">连接终端</span>
                            <span class="btn-loader"><span class="spinner"></span>连接中...</span>
                            <div class="btn-ripple"></div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-arrow"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                        <div class="card-footer">
                            <div class="status-indicator" id="statusIndicator"><span class="status-dot"></span><span class="status-text">就绪</span></div>
                        </div>
                    </form>
                </div>
            </div>
            <!-- Right edge buttons -->
            <div class="edge-btns" id="edgeBtns">
                <button class="edge-btn" onclick="toggleSettings()" title="设置" style="border-radius:10px 0 0 0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
                <button class="edge-btn" onclick="cycleTheme()" id="themeBtn" title="切换主题" style="border-radius:0;border-top:none;border-bottom:none">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <button class="edge-btn" onclick="toggleConnDrawer()" id="connDrawerTab" title="连接书签" style="border-radius:0 0 0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                </button>
            </div>
            <!-- Connection Bookmark Drawer -->
            <div class="conn-drawer" id="connDrawer">
                <div class="drawer-body glass-card">
                    <div class="drawer-hd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span>连接书签</span></div>
                    <div class="drawer-list" id="connBookmarkList"></div>
                    <button class="drawer-add" onclick="saveConnBookmark()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>保存当前</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== TERMINAL VIEW ==================== -->
    <div id="terminalView" class="view">
        <div class="term-topbar glass-bar">
            <div class="tab-bar" id="tabBar"></div>
            <button class="tab-add-btn" onclick="showAddTab()" title="新建连接">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <div class="console-instance-actions hidden" id="consoleInstanceActions">
                <button type="button" class="console-action-btn" data-title="重启（软重置）" onclick="consoleInstanceAction('SOFTRESET')">重启</button>
                <button type="button" class="console-action-btn danger" data-title="断电重启（硬重置）" onclick="consoleInstanceAction('RESET')">断电重启</button>
            </div>
            <div class="topbar-metrics" id="topbarMetrics"></div>
            <div class="topbar-right">
                <!-- Font size controls -->
                <button class="tb-btn" onclick="changeFontSize(-1)" title="缩小字体"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                <span class="font-size-label" id="fontSizeLabel">15</span>
                <button class="tb-btn" onclick="changeFontSize(1)" title="放大字体"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                <!-- Color picker -->
                <div class="color-picker-wrap">
                    <button class="tb-btn" onclick="toggleColorPicker()" title="终端颜色" id="colorPickerBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="13.5" cy="6.5" r="2.5" fill="#ff006e" stroke="none"/><circle cx="17.5" cy="10.5" r="2.5" fill="#00d4ff" stroke="none"/><circle cx="8.5" cy="10.5" r="2.5" fill="#00ff88" stroke="none"/><circle cx="6.5" cy="6.5" r="2.5" fill="#ffbe0b" stroke="none"/><path d="M12 22c-5.52 0-10-4.48-10-10S6.48 2 12 2s10 4.48 10 10-1.12 4-2.5 4H18c-1.1 0-2 .9-2 2 0 .55.23 1.05.59 1.41.36.36.59.86.59 1.41 0 1.1-.9 1.18-2 1.18z"/></svg></button>
                    <div class="color-panel glass-card" id="colorPanel">
                        <div class="color-section">
                            <label>前景色（文字）</label>
                            <div class="color-swatches" id="fgSwatches"></div>
                            <div class="color-custom"><input type="color" id="fgCustomColor" value="#e8e8f0" onchange="applyFgColor(this.value)"><span>自定义</span></div>
                        </div>
                        <div class="color-section">
                            <label>背景色</label>
                            <div class="color-swatches" id="bgSwatches"></div>
                            <div class="color-custom"><input type="color" id="bgCustomColor" value="#0a0a1a" onchange="applyBgColor(this.value)"><span>自定义</span></div>
                        </div>
                        <div class="color-section">
                            <label>光标色</label>
                            <div class="color-swatches" id="cursorSwatches"></div>
                            <div class="color-custom"><input type="color" id="cursorCustomColor" value="#00d4ff" onchange="applyCursorColor(this.value)"><span>自定义</span></div>
                        </div>
                        <button class="drawer-add" onclick="resetTermColors()" style="margin:4px 0 0">重置默认</button>
                    </div>
                </div>
                <div class="topbar-sep"></div>
                <!-- Copy / Paste -->
                <button class="tb-btn" onclick="termCopy()" title="复制选中 (Ctrl+Shift+C)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
                <button class="tb-btn" onclick="termPaste()" title="粘贴 (Ctrl+Shift+V)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></button>
                <div class="topbar-sep"></div>
                <button class="tb-btn" onclick="toggleScriptDrawer()" title="脚本书签"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
                <button class="tb-btn" onclick="toggleSftp()" title="SFTP"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></button>
                <button class="tb-btn" onclick="reconnectTab()" title="重连"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg></button>
                <button class="tb-btn danger" onclick="closeActiveTab()" title="断开"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"/></svg></button>
            </div>
        </div>
        <div class="term-main">
            <div class="term-body" id="terminalContainer"></div>
            <!-- Command Input Bar -->
            <div class="cmd-bar">
                <textarea class="cmd-input" id="cmdInput" placeholder="输入你想编辑的代码..." rows="1"></textarea>
                <button class="cmd-send" onclick="sendCmdInput()" title="发送 (Enter)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <!-- Right-click Context Menu -->
            <div class="ctx-menu glass-card" id="ctxMenu">
                <div class="ctx-item" onclick="termCopy()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>复制</div>
                <div class="ctx-item" onclick="termPaste()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>粘贴</div>
                <div class="ctx-sep"></div>
                <div class="ctx-item" onclick="termSelectAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 11V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h6"/><path d="M15 19l3 3 5-5"/></svg>全选</div>
                <div class="ctx-item" onclick="termClear()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>清屏</div>
            </div>
            <!-- Script Bookmark Drawer -->
            <!-- Right edge: script + sftp buttons -->
            <div class="term-edge-btns" id="termEdgeBtns">
                <button class="edge-btn" onclick="toggleScriptDrawer()" title="脚本书签" style="border-radius:10px 0 0 0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                </button>
                <button class="edge-btn" onclick="toggleSftp()" title="SFTP 文件管理" style="border-radius:0 0 0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                </button>
            </div>
            <div class="script-drawer" id="scriptDrawer">
                <div class="drawer-body glass-card">
                    <div class="drawer-hd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>脚本书签</span></div>
                    <div class="drawer-list" id="scriptBookmarkList"></div>
                    <div class="script-form" id="scriptForm">
                        <input type="text" id="scriptName" placeholder="脚本名称" class="script-input">
                        <textarea id="scriptContent" placeholder="输入命令..." rows="3" class="script-textarea"></textarea>
                        <button class="drawer-add" onclick="saveScriptBookmark()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>保存脚本</button>
                    </div>
                </div>
            </div>
            <!-- SFTP Panel -->
            <div class="sftp-panel" id="sftpPanel">
                <div class="sftp-header glass-bar">
                    <div class="sftp-path-bar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        <input type="text" id="sftpPath" class="sftp-path-input" placeholder="/" value="/">
                        <button class="tb-btn sm" onclick="sftpGo()" title="前往"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
                        <button class="tb-btn sm" onclick="sftpUp()" title="上级"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M18 15l-6-6-6 6"/></svg></button>
                    </div>
                    <div class="sftp-actions">
                        <label class="tb-btn sm upload-label" title="上传文件"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg><input type="file" id="sftpUploadInput" onchange="sftpUpload()" hidden multiple></label>
                        <button class="tb-btn sm" onclick="toggleSftp()" title="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    </div>
                </div>
                <div class="sftp-body" id="sftpBody">
                    <div class="sftp-loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Connect Dialog -->
    <div class="modal-overlay" id="addTabModal">
        <div class="glass-card modal-card">
            <div class="drawer-hd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>新建 SSH 连接</span></div>
            <div class="modal-body">
                <div class="input-row">
                    <div class="input-field flex-3"><input type="text" id="newTabHost" placeholder="主机地址" class="script-input"></div>
                    <div class="input-field flex-1"><input type="number" id="newTabPort" value="22" class="script-input"></div>
                </div>
                <div class="input-row">
                    <div class="input-field flex-1"><input type="text" id="newTabUser" value="root" placeholder="用户名" class="script-input"></div>
                    <div class="input-field flex-1"><input type="password" id="newTabPass" placeholder="密码" class="script-input"></div>
                </div>
                <div class="input-row" style="gap:6px">
                    <button class="drawer-add" style="flex:1;margin:0" onclick="addNewTab()">连接</button>
                    <button class="drawer-add" style="flex:1;margin:0;border-style:solid" onclick="hideAddTab()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="/webssh/static/js/app.js?v=48"></script>
</body>
</html>
